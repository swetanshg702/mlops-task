name: Docker Build and Run

on:
  push:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mlops-task .

      - name: Run Docker container
        run: docker run --rm mlops-task